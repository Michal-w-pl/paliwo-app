name: Aktualizuj ceny paliw

on:
  schedule:
    # Codziennie o 07:00 czasu polskiego (05:00 UTC w czasie letnim)
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Zainstaluj zależności
        run: pip install requests beautifulsoup4

      - name: Uruchom scraper
        run: python scraper.py

      - name: Sprawdź zmiany
        id: diff
        run: git diff --quiet data/prices.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit i push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git commit -m "chore: aktualizacja cen paliw $(date +'%Y-%m-%d')"
          git push

      - name: Brak zmian
        if: steps.diff.outputs.changed == 'false'
        run: echo "Ceny bez zmian."
